<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a0e05">
<title>키성장 퀘스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0d0805;display:flex;align-items:center;justify-content:center;}
#root{width:100%;max-width:420px;height:100%;max-height:900px;position:relative;}

/* Wood texture */
.wood-bg{background:linear-gradient(180deg,#2a1505 0%,#1a0e05 40%,#0e0803 100%);}

/* Scrollbar */
.scroll-area::-webkit-scrollbar{display:none;}
.scroll-area{-webkit-overflow-scrolling:touch;scrollbar-width:none;}

/* Parchment */
.parchment{background:radial-gradient(ellipse at 30% 20%,#e8d5a3,#cdba8a 40%,#b89e6a 100%);}

/* Rune border text */
.rune-border{font-family:'Cinzel',serif;font-size:7px;letter-spacing:3px;color:#6b4c1a;opacity:0.6;text-align:center;overflow:hidden;white-space:nowrap;}

/* Stone inset */
.stone-slot{
  background:linear-gradient(145deg,#0d0a06,#1a1208);
  box-shadow:inset 2px 2px 6px rgba(0,0,0,.8),inset -1px -1px 3px rgba(255,210,100,.08);
  border:1px solid #2a1e0a;
}

/* Gold frame */
.gold-frame{border:2px solid;border-image:linear-gradient(135deg,#c8a84b,#f5e28a,#c8a84b,#8a6620) 1;}

/* XP brass bar */
.xp-track{
  background:linear-gradient(90deg,#1a0e05,#2a1a08,#1a0e05);
  border:2px solid #6b4a1a;
  border-radius:6px;
  box-shadow:inset 0 2px 4px rgba(0,0,0,.6),0 1px 0 rgba(255,200,80,.2);
  position:relative;overflow:hidden;
}
.xp-fill{
  background:linear-gradient(90deg,#c87820,#f5c842,#e8a020);
  border-radius:4px;
  transition:width .6s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 8px rgba(245,200,66,.5);
}

/* Quest card corner brackets */
.quest-card-rpg{position:relative;}
.quest-card-rpg::before,.quest-card-rpg::after{
  content:'';position:absolute;width:10px;height:10px;
  border-color:#c8a84b;border-style:solid;
}
.quest-card-rpg::before{top:4px;left:4px;border-width:2px 0 0 2px;}
.quest-card-rpg::after{top:4px;right:4px;border-width:2px 2px 0 0;}
.quest-card-rpg .corner-bl,.quest-card-rpg .corner-br{
  position:absolute;width:10px;height:10px;
  border-color:#c8a84b;border-style:solid;
}
.quest-card-rpg .corner-bl{bottom:4px;left:4px;border-width:0 0 2px 2px;}
.quest-card-rpg .corner-br{bottom:4px;right:4px;border-width:0 2px 2px 0;}

/* Arrow header */
.arrow-header{
  display:inline-flex;align-items:center;
  background:linear-gradient(90deg,#4a2800,#6b3d10,#4a2800);
  border:1px solid #c8a84b;
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 50%,calc(100% - 12px) 100%,0 100%,12px 50%);
  padding:5px 24px 5px 20px;
  font-family:'Cinzel',serif;font-size:11px;font-weight:700;
  color:#f5e28a;letter-spacing:1px;
}

/* Nav gem */
.gem-active{
  box-shadow:0 0 12px rgba(16,185,129,.8),0 0 24px rgba(16,185,129,.4);
  color:#10b981!important;
}

/* Pin key */
.pin-key-rpg{
  background:linear-gradient(145deg,#2a1a08,#1a0e05);
  border:1px solid #6b4a1a;
  border-radius:8px;padding:12px;
  color:#f5e28a;font-size:16px;font-weight:700;
  font-family:'Cinzel',serif;cursor:pointer;
  box-shadow:2px 2px 4px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,200,80,.1);
}
.pin-key-rpg:active{transform:scale(0.95);box-shadow:inset 2px 2px 4px rgba(0,0,0,.5);}

/* Onboard */
.onboard-field{
  width:100%;background:rgba(0,0,0,.4);
  border:1px solid #6b4a1a;border-radius:8px;
  padding:10px 14px;color:#f5e28a;font-size:16px;
  font-family:'Noto Sans KR',sans-serif;text-align:center;
}
.onboard-field::placeholder{color:#6b4a1a;}

/* Photo upload */
.photo-upload-area{
  width:100%;border:2px dashed #6b4a1a;
  background:rgba(0,0,0,.2);border-radius:10px;
  padding:20px;text-align:center;cursor:pointer;
  color:#a07040;font-size:13px;
}

/* Modal */
.modal-overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.8);z-index:90;display:flex;align-items:flex-end;justify-content:center;}
.modal-overlay-bg.center{align-items:center;}

/* Toast */
.toast-popup{
  position:absolute;bottom:90px;left:50%;transform:translateX(-50%);
  background:rgba(20,10,2,.95);border:1px solid #c8a84b;
  color:#f5e28a;font-size:12px;font-weight:700;
  padding:10px 18px;border-radius:20px;white-space:nowrap;
  pointer-events:none;z-index:200;
  font-family:'Noto Sans KR',sans-serif;
}

/* Gacha */
.gacha-box-rpg{
  width:130px;height:130px;
  background:linear-gradient(135deg,#6b3d10,#c87820,#6b3d10);
  border:3px solid #f5e28a;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:52px;cursor:pointer;
  box-shadow:0 0 30px rgba(245,200,66,.4),inset 0 2px 0 rgba(255,255,255,.1);
}
.gacha-box-rpg:active{transform:scale(.95);}
.gacha-spin{animation:gspin .6s ease-out;}
@keyframes gspin{0%{transform:scale(1)rotate(0);}30%{transform:scale(1.15)rotate(-8deg);}60%{transform:scale(1.2)rotate(8deg);}100%{transform:scale(1)rotate(0);}

/* report chart */
}
.week-bar{background:linear-gradient(180deg,#f5e28a,#c87820);border-radius:3px 3px 0 0;min-height:4px;transition:height .3s;}
.week-bar.today-bar{background:linear-gradient(180deg,#ff9d5c,#ff6b6b);}

/* scrollbar hide globally */
*{scrollbar-width:none;}
*::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

  {id:'c3',cat:'core',name:'치즈 한 조각 도전',icon:'🧀',stars:2,desc:'아연의 보고, 치즈 한 조각. 한 입이면 충분하다. 작은 용기가 키를 키운다.',pts:[150,200,250]},

  {id:'c7',cat:'core',name:'콩나물국 먹기',icon:'🥣',stars:2,desc:'땅에서 솟아오른 식이섬유 군단! 장을 정복해야 키도 자란다.',pts:[150,200,250]},
  {id:'e1',cat:'exercise',name:'수영 30분',icon:'🏊',stars:3,desc:'물속에서 중력을 거스르는 자만이 전신 성장의 비밀을 얻는다. 입수!',pts:[200,300,400],weekend:true},
  {id:'e2',cat:'exercise',name:'산책 또는 달리기',icon:'🏃',stars:2,desc:'뼈에 부하를 걸어야 더 굵고 길게 자란다. 달리는 용사는 멈추지 않는다.',pts:[150,250,300],weekend:true},

const LEVEL_TABLE = [
  {lv:1,minPts:0,   maxPts:499,   title:'새싹 전사',   emoji:'🌱',rank:'4급'},

];

// ═══════ HELPERS ═══════
function getLevelByPts(pts){
  for(let i=LEVEL_TABLE.length-1;i>=0;i--){if(pts>=LEVEL_TABLE[i].minPts)return LEVEL_TABLE[i];}
  return LEVEL_TABLE[0];
}
function getXpProgress(pts){
  const lv=getLevelByPts(pts);
  const next=LEVEL_TABLE.find(l=>l.lv===lv.lv+1);
  if(!next)return{pct:100,current:pts,needed:lv.maxPts,nextLv:null};
  const inLevel=pts-lv.minPts;
  const needed=next.minPts-lv.minPts;
  return{pct:Math.round(inLevel/needed*100),current:inLevel,needed,nextLv:next};
}
function today(){return new Date().toISOString().slice(0,10);}
function isWeekend(){const d=new Date().getDay();return d===0||d===6;}
function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}
function randomPts(quest){
  const base=rand(quest.pts);
  const jitter=Math.round((Math.random()-.5)*20);
  return Math.max(quest.pts[0],base+jitter);
}
function getDailyQuests(){
  const todayD=today();
  const seed=todayD.replace(/-/g,'');
  const rng=(n)=>{
    let h=0;
    for(let i=0;i<seed.length;i++){h=(Math.imul(31,h)+seed.charCodeAt(i))|0;}
    return Math.abs(h*n)%1000/1000;
  };
  const isWE=isWeekend();
  const rarePool=QUEST_POOL.filter(q=>q.cat==='rare');
  const exercisePool=QUEST_POOL.filter(q=>q.cat==='exercise');
  const corePool=QUEST_POOL.filter(q=>q.cat==='core');
  const warmup=QUEST_POOL.filter(q=>q.cat==='warmup');
  const rareQuest=rng(7)<0.15?[rarePool[Math.floor(rng(3)*rarePool.length)]]:[];
  const exerciseQuest=isWE?[exercisePool[Math.floor(rng(5)*exercisePool.length)]]:[];
  const specialSlots=rareQuest.length+exerciseQuest.length;
  const remaining=3-specialSlots-1;
  const shuffled=[...corePool].sort(()=>rng(13)-.5);
  const core=shuffled.slice(0,Math.max(0,remaining));
  const w2=QUEST_POOL.find(q=>q.id==='w2');
  return{warmup:[w2],core,exercise:exerciseQuest,rare:rareQuest};
}

function getDefaultState(){
  return{
    profile:{name:'',pin:'1234',points:0,streak:0,lastActiveDate:null,totalApproved:0},
    heightHistory:[],weightHistory:[],
    questLog:[],pendingApprovals:[],rewardHistory:[],
    weekCycle:{startDate:null,completedDays:[],weeklyRewardPending:false,weeklyRewardClaimed:false},
    gachaQueue:0,purchasedItems:[],parentUnlocked:false,
  };
}

const STORAGE_KEY='growthquest_v2';
function loadState(){
  try{const r=localStorage.getItem(STORAGE_KEY);if(r)return{...getDefaultState(),...JSON.parse(r)};}catch(e){}
  return getDefaultState();
}
function saveState(s){localStorage.setItem(STORAGE_KEY,JSON.stringify(s));}

function getDynamicNick(name,questLog){
  const recent=questLog.filter(l=>{
    const d=new Date(l.date);const now=new Date();
    return(now-d)/(1000*60*60*24)<=7;
  });
  const catMap={};
  recent.forEach(l=>{
    const q=QUEST_POOL.find(q=>q.id===l.questId);
    if(q)catMap[q.id]=(catMap[q.id]||0)+1;
  });
  const nicks=[
    {id:'c2',text:'계란노른자를 정복한'},{id:'c3',text:'치즈를 무섭게 먹어대는'},
    {id:'c5',text:'소고기 사냥꾼'},{id:'e1',text:'수영장을 지배하는'},
    {id:'e3',text:'배드민턴 챔피언'},{id:'r1',text:'독서를 정복한'},{id:'c1',text:'우유 마스터'},
  ];
  const hit=nicks.find(n=>catMap[n.id]>=2);
  return hit?`${hit.text} ${name}`:name?`${name} 용사`:'성장을 시작한 용사';
}

function getStory(streak){
  const dow=new Date().getDay();
  const idx=(dow+Math.floor(streak/3))%STORY_POOL.length;
  return STORY_POOL[idx];
}

function XpBar({pts}){
  const xp=getXpProgress(pts);
  const lv=getLevelByPts(pts);
  return(
    <div style={{marginTop:10}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <span style={{fontFamily:'Cinzel,serif',fontSize:9,color:'#f5e28a',fontWeight:700}}>
          {xp.nextLv?`⚡ LV.${xp.nextLv.lv}까지`:'👑 MAX LEVEL'}
        </span>
        <span style={{fontFamily:'Cinzel,serif',fontSize:8,color:'#8a6a3a'}}>
          {xp.nextLv?`${xp.current} / ${xp.needed}P`:'전설급 달성'}
        </span>
      </div>
      <div className="xp-track" style={{height:14,borderRadius:6}}>

        {/* Gear ornament center */}

function QuestCard({quest,status,onPress}){
  const catColors={
    warmup:{bg:'linear-gradient(135deg,#1a0e30,#2d1855)',border:'rgba(168,85,247,.5)'},
    core:{bg:'linear-gradient(135deg,#0a1e35,#1a3a60)',border:'rgba(90,180,255,.4)'},
    exercise:{bg:'linear-gradient(135deg,#0a2010,#1a4020)',border:'rgba(90,200,120,.4)'},
    rare:{bg:'linear-gradient(135deg,#2a1500,#5a3500)',border:'rgba(245,226,138,.6)'},
  };
  const c=catColors[quest.cat]||catColors.core;
  const isDone=status==='done'||status==='approved';
  const isPending=status==='pending';
  return(
    <div
      className="quest-card-rpg"
      onClick={!isDone&&!isPending?onPress:undefined}
      style={{
        background:isDone?'rgba(0,0,0,.3)':c.bg,
        border:`1px solid ${isDone?'#3a2a10':c.border}`,
        borderRadius:12,padding:'12px 14px 12px 14px',
        display:'flex',alignItems:'center',gap:10,marginBottom:10,
        cursor:isDone||isPending?'default':'pointer',
        opacity:isDone?0.5:1,
        transition:'transform .1s',
        WebkitTapHighlightColor:'transparent',
      }}
      onTouchStart={e=>{if(!isDone&&!isPending)e.currentTarget.style.transform='scale(0.97)';}}
      onTouchEnd={e=>{e.currentTarget.style.transform='';}}
    >
      <div className="corner-bl"/><div className="corner-br"/>
      {/* Icon */}
      <div style={{
        width:40,height:40,borderRadius:10,
        background:c.bg,border:`1px solid ${c.border}`,
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:20,flexShrink:0,
        boxShadow:`0 2px 8px rgba(0,0,0,.4)`,
      }}>{quest.icon}</div>
      {/* Body */}
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:12,fontWeight:700,color:isDone?'#6a5a30':'#f5e28a',marginBottom:2,fontFamily:'Noto Sans KR,sans-serif'}}>{quest.name}</div>
        <div style={{fontSize:9,color:'#8a7040',lineHeight:1.5,fontFamily:'Noto Sans KR,sans-serif'}}>{quest.desc.slice(0,40)}...</div>
      </div>
      {/* Right */}
      <div style={{textAlign:'right',flexShrink:0}}>
        <div style={{fontSize:11,color:'#f5c842',marginBottom:3}}>{'⭐'.repeat(quest.stars)}</div>
        {isPending&&<span style={{fontSize:9,padding:'2px 6px',background:'rgba(90,180,255,.2)',color:'#5ab4ff',borderRadius:6,fontFamily:'Cinzel,serif'}}>검토중</span>}
        {status==='approved'&&<span style={{fontSize:9,padding:'2px 6px',background:'rgba(90,200,120,.2)',color:'#5ac878',borderRadius:6,fontFamily:'Cinzel,serif'}}>승인됨</span>}

      </div>
    </div>
  );
}

function HomeScreen({state,setState,showToast}){
  const [activeQuestId,setActiveQuestId]=React.useState(null);
  const [photoData,setPhotoData]=React.useState(null);
  const fileRef=React.useRef();
  const daily=getDailyQuests();
  const allQuests=[...daily.warmup,...daily.core,...daily.exercise,...daily.rare];
  const todayLog=state.questLog.filter(l=>l.date===today());
  const todayPending=state.pendingApprovals.filter(p=>{
    const q=QUEST_POOL.find(q=>q.id===p.questId);
    return q&&today()===p.submittedAt?.slice(0,10);
  });
  function questStatus(qid){
    if(todayLog.find(l=>l.questId===qid))return'done';
    if(state.pendingApprovals.find(p=>p.questId===qid))return'pending';
    return'idle';
  }
  function openQuestModal(qid){setActiveQuestId(qid);setPhotoData(null);}
  function closeModal(){setActiveQuestId(null);setPhotoData(null);}
  function handlePhotoChange(e){
    const f=e.target.files?.[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>setPhotoData(ev.target.result);r.readAsDataURL(f);
  }
  function submitQuest(){
    if(!activeQuestId)return;
    const newPending={
      id:Date.now().toString(),questId:activeQuestId,
      photo:photoData,submittedAt:new Date().toISOString(),
    };
    const ns={...state,pendingApprovals:[...state.pendingApprovals,newPending]};
    saveState(ns);setState(ns);
    showToast('📸 제출 완료! 부모님 승인을 기다려요');
    closeModal();
  }
  const activeQuest=QUEST_POOL.find(q=>q.id===activeQuestId);

  // Weekly bonus check
  function checkWeekly(){
    const wc=state.weekCycle;
    if(!wc||wc.weeklyRewardPending||wc.weeklyRewardClaimed)return false;
    const days=(wc.completedDays||[]).length;
    return days>=5;
  }
  function claimWeekly(){
    const ns={...state,gachaQueue:(state.gachaQueue||0)+3,
      weekCycle:{...state.weekCycle,weeklyRewardPending:false,weeklyRewardClaimed:true}};
    saveState(ns);setState(ns);
    showToast('🎉 주간 보상 획득! 가챠 3개 추가!');
  }
  const showWeekly=checkWeekly();
  return(
    <div className="scroll-area" style={{flex:1,overflowY:'auto',padding:'0 12px 80px'}}>
      <CharCard state={state}/>
      {showWeekly&&(
        <div style={{background:'linear-gradient(135deg,rgba(200,168,75,.2),rgba(168,85,247,.15))',border:'1px solid #c8a84b',borderRadius:14,padding:14,textAlign:'center',marginBottom:14}}>
          <div style={{fontSize:24,marginBottom:4}}>🎉</div>
          <div style={{fontFamily:'Cinzel,serif',fontSize:12,fontWeight:700,color:'#f5e28a',marginBottom:4}}>주간 목표 달성!</div>
          <div style={{fontFamily:'Noto Sans KR,sans-serif',fontSize:11,color:'#c8a87a',marginBottom:8}}>이번 주 5일 이상 퀘스트를 완료했어요</div>
          <button onClick={claimWeekly} style={{background:'#c8a84b',color:'#1a0e05',fontWeight:700,fontSize:12,border:'none',borderRadius:10,padding:'8px 20px',cursor:'pointer',fontFamily:'Cinzel,serif'}}>보상 받기 →</button>
        </div>
      )}
      <StoryCard streak={state.profile.streak||0}/>
      <ArrowHeader icon="🌙" text="워밍업 퀘스트"/>
      {daily.warmup.map(q=><QuestCard key={q.id} quest={q} status={questStatus(q.id)} onPress={()=>openQuestModal(q.id)}/>)}
      <ArrowHeader icon="⚡" text="오늘의 핵심 퀘스트"/>
      {daily.core.map(q=><QuestCard key={q.id} quest={q} status={questStatus(q.id)} onPress={()=>openQuestModal(q.id)}/>)}
      {daily.exercise.length>0&&<><ArrowHeader icon="🏃" text="주말 운동 퀘스트"/>{daily.exercise.map(q=><QuestCard key={q.id} quest={q} status={questStatus(q.id)} onPress={()=>openQuestModal(q.id)}/>)}</>}
      {daily.rare.length>0&&<><ArrowHeader icon="✨" text="레어 퀘스트"/>{daily.rare.map(q=><QuestCard key={q.id} quest={q} status={questStatus(q.id)} onPress={()=>openQuestModal(q.id)}/>)}</>}

      {/* Quest modal */}
      {activeQuestId&&(
        <div className="modal-overlay-bg" onClick={closeModal}>
          <div onClick={e=>e.stopPropagation()} style={{background:'linear-gradient(180deg,#2a1a08,#1a0e05)',border:'2px solid #6b4a1a',borderRadius:'20px 20px 0 0',padding:'24px 20px 30px',width:'100%',maxWidth:420}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:14,fontWeight:700,color:'#f5e28a',marginBottom:6}}>{activeQuest?.icon} {activeQuest?.name}</div>
            <div style={{fontFamily:'Noto Sans KR,sans-serif',fontSize:11,color:'#a07840',lineHeight:1.7,marginBottom:14}}>{activeQuest?.desc}</div>
            {photoData&&<img src={photoData} style={{width:'100%',height:140,objectFit:'cover',borderRadius:10,marginBottom:10,border:'1px solid #6b4a1a'}}/>}
            <div className="photo-upload-area" onClick={()=>fileRef.current?.click()}>

            <button onClick={submitQuest} style={{width:'100%',background:'linear-gradient(135deg,#6b3d10,#c87820)',border:'1px solid #f5e28a',borderRadius:12,padding:13,fontSize:14,fontWeight:700,color:'#f5e28a',cursor:'pointer',marginTop:10,fontFamily:'Cinzel,serif'}}>퀘스트 제출!</button>
            <button onClick={closeModal} style={{width:'100%',background:'transparent',border:'1px solid #3a2a10',borderRadius:12,padding:10,fontSize:13,color:'#6a5a40',cursor:'pointer',marginTop:8,fontFamily:'Cinzel,serif'}}>나중에</button>
          </div>
        </div>
      )}
    </div>
  );
}

function GachaScreen({state,setState,showToast}){
  const [spinning,setSpinning]=React.useState(false);
  const [result,setResult]=React.useState(null);
  const [revealModal,setRevealModal]=React.useState(null);
  function openGacha(){
    if((state.gachaQueue||0)===0)return;
    setSpinning(true);
    setTimeout(()=>{
      const isRare=Math.random()<0.15;
      const ptChoices=isRare?[500,700,1000]:[80,150,200,250,300];
      const pts=ptChoices[Math.floor(Math.random()*ptChoices.length)];
      const jitter=Math.round((Math.random()-.5)*30);
      const awarded=Math.max(pts,pts+jitter);
      const ns={...state,
        profile:{...state.profile,points:(state.profile.points||0)+awarded},
        gachaQueue:(state.gachaQueue||0)-1,
        rewardHistory:[{icon:isRare?'🌟':'🎁',name:isRare?'희귀 보상':'일반 보상',pts:awarded,date:today()},...(state.rewardHistory||[])].slice(0,20),
      };
      saveState(ns);setState(ns);
      setSpinning(false);
      setRevealModal({pts:awarded,isRare,icon:isRare?'🌟':'🎁'});
    },600);
  }
  function buyItem(item){
    const pts=state.profile.points||0;
    if(pts<item.cost){showToast('포인트가 부족해요!');return;}
    const ns={...state,
      profile:{...state.profile,points:pts-item.cost},
      purchasedItems:[...(state.purchasedItems||[]),{id:item.id,name:item.name,date:today()}],
      rewardHistory:[{icon:item.icon,name:`[구매] ${item.name}`,pts:-item.cost,date:today()},...(state.rewardHistory||[])].slice(0,20),
    };
    saveState(ns);setState(ns);
    showToast(`🎉 ${item.name} 구매 완료!`);
  }
  return(
    <div className="scroll-area" style={{flex:1,overflowY:'auto',padding:'0 12px 80px'}}>
      <ArrowHeader icon="🎰" text="가챠 보상함"/>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'20px 0'}}>
        <div className={`gacha-box-rpg${spinning?' gacha-spin':''}`} onClick={openGacha}>🎁</div>
        <div style={{fontFamily:'Cinzel,serif',fontSize:11,color:'#f5e28a',background:'linear-gradient(135deg,#4a2800,#6b3d10)',border:'1px solid #c8a84b',borderRadius:10,padding:'4px 14px',marginTop:12,marginBottom:10}}>
          대기 중인 보상 {state.gachaQueue||0}개
        </div>
        <button onClick={openGacha} disabled={!state.gachaQueue||spinning} style={{background:'linear-gradient(135deg,#6b3d10,#c87820)',border:'2px solid #f5e28a',borderRadius:14,padding:'11px 28px',fontSize:13,fontWeight:700,color:'#f5e28a',cursor:'pointer',fontFamily:'Cinzel,serif',opacity:!state.gachaQueue?0.4:1}}>
          보상 열기!
        </button>
      </div>
      <ArrowHeader icon="🛒" text="보상 상점"/>
      {SHOP_ITEMS.map(item=>(
        <div key={item.id} style={{background:'linear-gradient(135deg,#2a1a08,#1a0e05)',border:'1px solid #4a3010',borderRadius:12,padding:'12px',marginBottom:10,display:'flex',alignItems:'center',gap:10}}>
          <div style={{fontSize:24,flexShrink:0}}>{item.icon}</div>
          <div style={{flex:1}}>
            <div style={{fontFamily:'Noto Sans KR,sans-serif',fontSize:13,fontWeight:700,color:'#f5e28a',marginBottom:2}}>{item.name}</div>
            <div style={{fontFamily:'Cinzel,serif',fontSize:10,color:'#c8a84b',fontWeight:700}}>🪙 {item.cost.toLocaleString()}P</div>
            <div style={{fontFamily:'Noto Sans KR,sans-serif',fontSize:10,color:'#6a5a40'}}>{item.desc}</div>
          </div>
          <button onClick={()=>buyItem(item)} disabled={(state.profile.points||0)<item.cost} style={{background:'linear-gradient(135deg,#6b3d10,#c87820)',border:'1px solid #f5e28a',borderRadius:10,padding:'7px 12px',fontSize:11,fontWeight:700,color:'#f5e28a',cursor:'pointer',flexShrink:0,fontFamily:'Cinzel,serif',opacity:(state.profile.points||0)<item.cost?0.35:1}}>
            구매
          </button>
        </div>
      ))}
      <ArrowHeader icon="📋" text="최근 보상 기록"/>
      {(state.rewardHistory||[]).slice(0,10).map((r,i)=>(
        <div key={i} style={{background:'rgba(0,0,0,.3)',border:'1px solid #2a1a08',borderRadius:10,padding:'10px 12px',marginBottom:8,display:'flex',alignItems:'center',gap:10,fontFamily:'Noto Sans KR,sans-serif',fontSize:12}}>
          <span>{r.icon}</span>
          <span style={{flex:1,color:'#c8a87a'}}>{r.name}</span>
          <span style={{color:r.pts>0?'#f5c842':'#ff6b6b',fontWeight:700,fontFamily:'Cinzel,serif'}}>{r.pts>0?'+':''}{r.pts}P</span>
        </div>
      ))}
      {(!state.rewardHistory||state.rewardHistory.length===0)&&<div style={{textAlign:'center',color:'#4a3a20',fontSize:12,padding:20,fontFamily:'Noto Sans KR,sans-serif'}}>아직 보상 기록이 없어요</div>}

      {/* Gacha reveal modal */}
      {revealModal&&(
        <div className="modal-overlay-bg center" onClick={()=>setRevealModal(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:'linear-gradient(180deg,#2a1a08,#1a0e05)',border:'2px solid #c8a84b',borderRadius:20,padding:'28px 24px',maxWidth:300,margin:'0 16px',textAlign:'center',width:'100%'}}>
            <div style={{fontSize:52,marginBottom:10}}>{revealModal.icon}</div>
            <div style={{fontFamily:'Cinzel,serif',fontSize:28,fontWeight:900,color:'#f5e28a',marginBottom:4}}>+{revealModal.pts}P</div>
            <div style={{fontFamily:'Noto Sans KR,sans-serif',fontSize:12,color:'#c8a87a',marginBottom:4}}>{revealModal.isRare?'🌟 희귀 보상 획득!':'보상 획득!'}</div>
            <button onClick={()=>setRevealModal(null)} style={{width:'100%',background:'linear-gradient(135deg,#6b3d10,#c87820)',border:'2px solid #f5e28a',borderRadius:12,padding:12,fontSize:14,fontWeight:700,color:'#f5e28a',cursor:'pointer',marginTop:14,fontFamily:'Cinzel,serif'}}>받기! 🎉</button>
          </div>
        </div>
      )}
    </div>
  );
}

      </div>
      {/* Mini stats */}
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        {[
          {icon:'⚡',v:`Lv.${lv.lv}`,l:'현재 레벨'},
          {icon:'🔥',v:`${state.profile.streak||0}일`,l:'연속 달성'},
          {icon:'🪙',v:pts,l:'누적 포인트'},
        ].map((m,i)=>(
          <div key={i} className="stone-slot" style={{flex:1,borderRadius:12,padding:'10px 6px',textAlign:'center'}}>
            <div style={{fontSize:18,marginBottom:2}}>{m.icon}</div>
            <div style={{fontFamily:'Cinzel,serif',fontSize:14,fontWeight:900,color:'#f5e28a'}}>{m.v}</div>
            <div style={{fontFamily:'Noto Sans KR,sans-serif',fontSize:9,color:'#6a5a40'}}>{m.l}</div>
          </div>
        ))}
      </div>
      {/* Week bar chart */}
      <div style={{background:'rgba(0,0,0,.3)',border:'1px solid #2a1a08',borderRadius:14,padding:'12px',marginBottom:12}}>
        <div style={{fontFamily:'Cinzel,serif',fontSize:11,fontWeight:700,color:'#c8a87a',marginBottom:10}}>📊 이번 주 퀘스트 현황</div>
        <div style={{display:'flex',alignItems:'flex-end',gap:6,height:60}}>
          {today7.map((d,i)=>{
            const cnt=questCountByDay[i];
            const h=cnt>0?Math.round(cnt/maxQ*56)+4:4;
            const isTod=i===todayIdx;
            const dow=new Date(d+'T12:00').getDay();
            return(
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                <div className={isTod?'today-bar':'week-bar'} style={{width:'100%',height:h}}/>
                <div style={{fontFamily:'Cinzel,serif',fontSize:8,color:isTod?'#f5e28a':'#6a5a40'}}>{days[dow]}</div>
              </div>
            );
          })}
        </div>
        {questCountByDay.reduce((a,b)=>a+b,0)>=15&&(
          <div style={{background:'linear-gradient(135deg,rgba(200,168,75,.15),rgba(168,85,247,.1))',border:'1px solid #c8a84b',borderRadius:10,padding:12,fontSize:11,lineHeight:1.7,color:'#f5e28a',marginTop:8,fontFamily:'Noto Sans KR,sans-serif'}}>
            🏆 이번 주 <b>{questCountByDay.reduce((a,b)=>a+b,0)}개</b> 퀘스트 클리어! 대단해요!
          </div>
        )}
      </div>
      {/* Input card */}
      <div style={{background:'rgba(0,0,0,.3)',border:'1px solid #2a1a08',borderRadius:14,padding:14,marginBottom:14}}>
        <div style={{fontFamily:'Cinzel,serif',fontSize:12,fontWeight:700,color:'#f5e28a',marginBottom:10}}>📝 신체 기록 입력</div>
        <div style={{marginBottom:8}}>
          <div style={{fontFamily:'Noto Sans KR,sans-serif',fontSize:9,color:'#6a5a40',marginBottom:4}}>날짜</div>
          <input type="date" value={dateVal} onChange={e=>setDateVal(e.target.value)} className="onboard-field" style={{textAlign:'left'}}/>
        </div>
        <div style={{display:'flex',gap:6,marginBottom:10}}>
          <div style={{flex:1}}>
            <div style={{fontFamily:'Noto Sans KR,sans-serif',fontSize:9,color:'#6a5a40',marginBottom:4}}>키 (cm)</div>
            <input type="number" value={hVal} onChange={e=>setHVal(e.target.value)} placeholder="예: 138.5" step="0.1" className="onboard-field" style={{textAlign:'left'}}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontFamily:'Noto Sans KR,sans-serif',fontSize:9,color:'#6a5a40',marginBottom:4}}>몸무게 (kg)</div>
            <input type="number" value={wVal} onChange={e=>setWVal(e.target.value)} placeholder="예: 33.2" step="0.1" className="onboard-field" style={{textAlign:'left'}}/>
          </div>
        </div>
        <button onClick={saveRecord} style={{width:'100%',background:'linear-gradient(135deg,#4a2800,#8a5010)',border:'1px solid #c8a84b',borderRadius:10,padding:10,fontSize:12,fontWeight:700,color:'#f5e28a',cursor:'pointer',fontFamily:'Cinzel,serif'}}>기록 저장하기</button>
        {saved&&<div style={{textAlign:'center',fontSize:11,color:'#5ac878',fontWeight:700,marginTop:6,fontFamily:'Noto Sans KR,sans-serif'}}>{saved}</div>}
      </div>
    </div>
  );
}

function ParentScreen({state,setState,pinVerified,showToast}){
  function approveQuest(pendingId){
    const pending=state.pendingApprovals.find(p=>p.id===pendingId);
    if(!pending)return;
    const quest=QUEST_POOL.find(q=>q.id===pending.questId);
    const pts=randomPts(quest);
    const newLog={date:today(),questId:pending.questId,pointsAwarded:pts,timestamp:Date.now()};
    const newHistory=[{icon:quest.icon,name:quest.name,pts,date:today()},...(state.rewardHistory||[])].slice(0,20);
    // update streak
    let streak=state.profile.streak||0;
    const last=state.profile.lastActiveDate;
    if(last===today()){}
    else if(last&&(new Date(today())-new Date(last))<86400000*2)streak+=1;
    else streak=1;
    // week cycle
    let wc={...state.weekCycle};
    if(!wc.startDate){const now=new Date();const dow=now.getDay();const start=new Date(now);start.setDate(now.getDate()-dow);wc.startDate=start.toISOString().slice(0,10);wc.completedDays=[];wc.weeklyRewardPending=false;wc.weeklyRewardClaimed=false;}
    if(!wc.completedDays.includes(today()))wc.completedDays=[...wc.completedDays,today()];
    if(wc.completedDays.length>=5&&!wc.weeklyRewardClaimed)wc.weeklyRewardPending=true;
    const ns={...state,
      profile:{...state.profile,points:(state.profile.points||0)+pts,streak,lastActiveDate:today(),totalApproved:(state.profile.totalApproved||0)+1},
      questLog:[...state.questLog,newLog],
      pendingApprovals:state.pendingApprovals.filter(p=>p.id!==pendingId),
      rewardHistory:newHistory,
      gachaQueue:(state.gachaQueue||0)+1,
      weekCycle:wc,
    };
    saveState(ns);setState(ns);
    showToast(`✅ 승인! +${pts}P 획득`);
  }
  function rejectQuest(pendingId){
    const ns={...state,pendingApprovals:state.pendingApprovals.filter(p=>p.id!==pendingId)};
    saveState(ns);setState(ns);
    showToast('❌ 거부됨');
  }
  function resetData(){
    if(!window.confirm('모든 데이터를 초기화할까요?\n이 작업은 되돌릴 수 없습니다.'))return;
    const ns=getDefaultState();
    saveState(ns);setState(ns);
    showToast('🗑️ 데이터 초기화 완료');
  }
  const pending=state.pendingApprovals||[];
  return(
    <div className="scroll-area" style={{flex:1,overflowY:'auto',padding:'0 12px 80px'}}>
      <ArrowHeader icon="👤" text="부모 관리 화면"/>
      {/* Stats summary */}
      <div style={{background:'rgba(0,0,0,.3)',border:'1px solid #2a1a08',borderRadius:12,padding:12,marginBottom:12}}>
        <div style={{fontFamily:'Cinzel,serif',fontSize:10,fontWeight:700,color:'#c8a84b',marginBottom:6}}>📊 현황 요약</div>
        <div style={{display:'flex',gap:6}}>
          {[
            {label:'누적 포인트',value:`${state.profile.points||0}P`},
            {label:'총 승인',value:`${state.profile.totalApproved||0}회`},
            {label:'연속일',value:`${state.profile.streak||0}일`},
          ].map((s,i)=>(
            <div key={i} className="stone-slot" style={{flex:1,borderRadius:8,padding:'6px',textAlign:'center'}}>
              <div style={{fontFamily:'Cinzel,serif',fontSize:12,fontWeight:900,color:'#f5e28a'}}>{s.value}</div>
              <div style={{fontFamily:'Noto Sans KR,sans-serif',fontSize:8,color:'#6a5a40'}}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>
      <ArrowHeader icon="⏳" text="승인 대기 목록"/>
      {pending.length===0&&<div style={{textAlign:'center',color:'#4a3a20',fontSize:12,padding:16,fontFamily:'Noto Sans KR,sans-serif'}}>대기 중인 항목이 없어요</div>}
      {pending.map(p=>{
        const q=QUEST_POOL.find(q=>q.id===p.questId);
        if(!q)return null;
        return(
          <div key={p.id} style={{background:'rgba(0,0,0,.3)',border:'1px solid #3a2a10',borderRadius:12,padding:10,display:'flex',gap:10,alignItems:'center',marginBottom:8}}>
            {p.photo
              ?<img src={p.photo} style={{width:48,height:48,borderRadius:8,objectFit:'cover',flexShrink:0,border:'1px solid #6b4a1a'}}/>
              :<div style={{width:48,height:48,borderRadius:8,background:'linear-gradient(135deg,#3b82f6,#06b6d4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{q.icon}</div>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:'Noto Sans KR,sans-serif',fontSize:12,fontWeight:700,color:'#f5e28a',marginBottom:2}}>{q.name}</div>
              <div style={{fontFamily:'Cinzel,serif',fontSize:9,color:'#6a5a40'}}>{new Date(p.submittedAt).toLocaleString('ko-KR')}</div>
            </div>
            <button onClick={()=>approveQuest(p.id)} style={{background:'#00b37e',color:'#fff',fontSize:11,fontWeight:700,border:'none',borderRadius:8,padding:'6px 10px',cursor:'pointer',flexShrink:0,fontFamily:'Cinzel,serif'}}>승인</button>
            <button onClick={()=>rejectQuest(p.id)} style={{background:'rgba(255,107,107,.15)',color:'#ff6b6b',fontSize:11,fontWeight:700,border:'1px solid rgba(255,107,107,.3)',borderRadius:8,padding:'6px 8px',cursor:'pointer',flexShrink:0,fontFamily:'Cinzel,serif'}}>거부</button>
          </div>
        );
      })}
      {/* Data reset */}
      <div style={{marginTop:20,borderTop:'1px solid #2a1a08',paddingTop:14}}>
        <button onClick={resetData} style={{width:'100%',background:'rgba(255,107,107,.1)',border:'1px solid rgba(255,107,107,.3)',borderRadius:10,padding:10,fontSize:12,fontWeight:700,color:'#ff6b6b',cursor:'pointer',fontFamily:'Cinzel,serif'}}>
          🗑️ 데이터 초기화
        </button>
      </div>
    </div>
  );
}

function PinOverlay({onSuccess,onCancel,pin}){
  const [buf,setBuf]=React.useState('');
  const [err,setErr]=React.useState('');
  function press(k){
    if(k==='del'){setBuf(b=>b.slice(0,-1));setErr('');return;}
    if(k==='ok'){
      if(buf===pin){onSuccess();}
      else{setErr('PIN이 틀렸습니다');setBuf('');}
      return;
    }
    if(buf.length<4)setBuf(b=>b+k);
  }
  return(
    <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.88)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:100}}>
      <div style={{background:'linear-gradient(180deg,#2a1a08,#1a0e05)',border:'2px solid #6b4a1a',borderRadius:20,padding:'28px 24px',textAlign:'center',width:280}}>
        <div style={{fontFamily:'Cinzel,serif',fontSize:14,fontWeight:700,color:'#f5e28a',marginBottom:4}}>🔐 부모 인증</div>
        <div style={{fontFamily:'Noto Sans KR,sans-serif',fontSize:11,color:'#6a5a40',marginBottom:18}}>PIN 번호 4자리를 입력하세요</div>
        <div style={{display:'flex',justifyContent:'center',gap:10,marginBottom:18}}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{width:14,height:14,borderRadius:'50%',background:i<buf.length?'#c8a84b':'transparent',border:'2px solid',borderColor:i<buf.length?'#c8a84b':'#4a3010'}}/>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:10}}>
          {['1','2','3','4','5','6','7','8','9','del','0','ok'].map(k=>(
            <button key={k} className="pin-key-rpg" onClick={()=>press(k)}>{k==='del'?'⌫':k==='ok'?'확인':k}</button>
          ))}
        </div>
        <div style={{fontFamily:'Noto Sans KR,sans-serif',fontSize:11,color:'#ff6b6b',minHeight:14}}>{err}</div>
        <span onClick={onCancel} style={{fontFamily:'Cinzel,serif',fontSize:11,color:'#4a3010',cursor:'pointer',display:'inline-block',marginTop:10}}>취소</span>
      </div>
    </div>
  );
}

function OnboardScreen({onDone}){
  const [name,setName]=React.useState('');
  const [h,setH]=React.useState('');
  const [w,setW]=React.useState('');
  const [pin,setPin]=React.useState('');
  function submit(){
    if(!name.trim()){alert('이름을 입력해주세요!');return;}
    if(!pin||pin.length<4){alert('PIN 4자리를 입력해주세요!');return;}
    onDone(name.trim(),parseFloat(h),parseFloat(w),pin);
  }
  return(
    <div style={{position:'absolute',inset:0,background:'linear-gradient(180deg,#2a1505,#1a0e05,#0e0803)',zIndex:150,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'30px 24px'}}>
      <div style={{fontSize:56,marginBottom:14}}>🏆</div>
      <div style={{fontFamily:'Cinzel,serif',fontSize:12,fontWeight:700,color:'#f5e28a',textAlign:'center',marginBottom:8,lineHeight:1.8,letterSpacing:2}}>키성장 퀘스트</div>
      <div style={{fontFamily:'Noto Sans KR,sans-serif',fontSize:13,color:'#c8a87a',textAlign:'center',marginBottom:24,lineHeight:1.7}}>닉네임을 입력하고<br/>성장 모험을 시작하세요!</div>
      <input className="onboard-field" placeholder="이름 (예: 민준)" maxLength={6} value={name} onChange={e=>setName(e.target.value)} style={{marginBottom:12}}/>
      <div style={{fontFamily:'Noto Sans KR,sans-serif',fontSize:11,color:'#6a5a40',marginBottom:8}}>현재 키 / 몸무게</div>
      <div style={{display:'flex',gap:8,width:'100%',marginBottom:16}}>
        <input className="onboard-field" placeholder="키 (cm)" type="number" step="0.1" value={h} onChange={e=>setH(e.target.value)} style={{margin:0}}/>
        <input className="onboard-field" placeholder="몸무게 (kg)" type="number" step="0.1" value={w} onChange={e=>setW(e.target.value)} style={{margin:0}}/>
      </div>
      <div style={{fontFamily:'Noto Sans KR,sans-serif',fontSize:11,color:'#6a5a40',marginBottom:8}}>부모 PIN 설정 (4자리)</div>
      <input className="onboard-field" placeholder="예: 1234" type="number" maxLength={4} value={pin} onChange={e=>setPin(e.target.value)} style={{marginBottom:20}}/>
      <button onClick={submit} style={{width:'100%',background:'linear-gradient(135deg,#4a2800,#c87820)',border:'2px solid #f5e28a',borderRadius:14,padding:14,fontSize:15,fontWeight:700,color:'#f5e28a',cursor:'pointer',fontFamily:'Cinzel,serif'}}>
        시작하기 🚀
      </button>
      <div style={{fontFamily:'Noto Sans KR,sans-serif',fontSize:10,color:'#3a2a10',marginTop:10,textAlign:'center'}}>데이터는 이 기기에만 저장됩니다</div>
    </div>
  );
}

function BottomNav({active,onSwitch,gachaQueue}){
  const tabs=[
    {id:'home',icon:'🏠',label:'홈'},
    {id:'gacha',icon:'🎁',label:'보상함',badge:gachaQueue},
    {id:'report',icon:'📈',label:'리포트'},
    {id:'parent',icon:'👤',label:'부모뷰'},
  ];
  return(
    <div style={{display:'flex',justifyContent:'space-around',background:'linear-gradient(180deg,#1a0e05,#0d0803)',borderTop:'2px solid #3a2000',padding:'8px 0 max(env(safe-area-inset-bottom),10px)',flexShrink:0}}>
      {tabs.map(t=>{
        const isAct=active===t.id;
        return(
          <div key={t.id} onClick={()=>onSwitch(t.id)} style={{textAlign:'center',cursor:'pointer',padding:'2px 10px',position:'relative'}}>
            <div style={{
              fontSize:20,display:'block',marginBottom:2,
              filter:isAct?'drop-shadow(0 0 6px rgba(16,185,129,.8))':'none',
            }}>{t.icon}</div>
            <div style={{
              fontFamily:'Cinzel,serif',fontSize:8,fontWeight:700,
              color:isAct?'#10b981':'#4a3010',
              textShadow:isAct?'0 0 8px rgba(16,185,129,.6)':'none',
            }}>{t.label}</div>
            {t.badge>0&&<div style={{position:'absolute',top:0,right:6,background:'#f5c842',color:'#1a0e05',fontSize:9,fontWeight:900,borderRadius:'50%',width:14,height:14,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Cinzel,serif'}}>{t.badge}</div>}
          </div>
        );
      })}
    </div>
  );
}

function App(){
  const [state,setState]=React.useState(()=>loadState());
  const [tab,setTab]=React.useState('home');
  const [showPin,setShowPin]=React.useState(false);
  const [pendingTab,setPendingTab]=React.useState(null);
  const [pinVerified,setPinVerified]=React.useState(false);
  const [toast,setToast]=React.useState(null);
  const toastTimer=React.useRef(null);

  function showToast(msg){
    setToast(msg);
    if(toastTimer.current)clearTimeout(toastTimer.current);
    toastTimer.current=setTimeout(()=>setToast(null),2400);
  }

  function switchTab(id){
    if(id==='parent'&&!pinVerified){
      setPendingTab(id);setShowPin(true);return;
    }
    setTab(id);
  }
  function onPinSuccess(){
    setShowPin(false);setPinVerified(true);setTab(pendingTab||'parent');setPendingTab(null);
  }
  function onPinCancel(){setShowPin(false);setPendingTab(null);}

  // Reset pin verification when leaving parent tab
  React.useEffect(()=>{
    if(tab!=='parent')setPinVerified(false);
  },[tab]);

  function onOnboardDone(name,h,w,pin){
    let ns={...getDefaultState(),profile:{...getDefaultState().profile,name,pin}};
    if(!isNaN(h)&&h>0)ns.heightHistory=[{date:today(),value:h}];
    if(!isNaN(w)&&w>0)ns.weightHistory=[{date:today(),value:w}];
    saveState(ns);setState(ns);
  }

  if(!state.profile.name){
    return(
      <div className="wood-bg" style={{width:'100%',height:'100%',position:'relative'}}>
        <OnboardScreen onDone={onOnboardDone}/>
      </div>
    );
  }

  return(
    <div className="wood-bg" style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',position:'relative',overflow:'hidden'}}>
      {/* Topbar */}
      <div style={{
        padding:'max(env(safe-area-inset-top),10px) 14px 8px',
        background:'linear-gradient(180deg,#1a0a00,#0d0500)',
        borderBottom:'2px solid #3a2000',flexShrink:0,
        display:'flex',justifyContent:'space-between',alignItems:'center',
      }}>
        <div style={{fontFamily:'Cinzel,serif',fontSize:11,fontWeight:700,color:'#c8a84b',letterSpacing:1}}>
          ⚔️ <span>{state.profile.name}</span>의 위대한 여정
        </div>
        <div onClick={()=>showToast(`누적 포인트: ${state.profile.points||0}P`)} style={{
          background:'linear-gradient(135deg,#2a1505,#4a2800)',
          border:'1px solid #8a6620',borderRadius:20,
          padding:'4px 12px',fontSize:12,fontWeight:700,
          display:'flex',alignItems:'center',gap:5,cursor:'pointer',
          color:'#f5e28a',fontFamily:'Cinzel,serif',
        }}>
          🪙 <span>{state.profile.points||0}</span>
        </div>
      </div>

      {/* Screen content */}
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {tab==='home'&&<HomeScreen state={state} setState={setState} showToast={showToast}/>}
        {tab==='gacha'&&<GachaScreen state={state} setState={setState} showToast={showToast}/>}
        {tab==='report'&&<ReportScreen state={state} setState={setState} showToast={showToast}/>}
        {tab==='parent'&&pinVerified&&<ParentScreen state={state} setState={setState} pinVerified={pinVerified} showToast={showToast}/>}
      </div>

      <BottomNav active={tab} onSwitch={switchTab} gachaQueue={state.gachaQueue||0}/>

      {showPin&&<PinOverlay pin={state.profile.pin||'1234'} onSuccess={onPinSuccess} onCancel={onPinCancel}/>}

      {toast&&<div className="toast-popup">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
